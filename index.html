                        ></textarea>
                      </div>

                      <div className="flex flex-wrap items-center justify-between gap-4 pt-2">
                        <span className="text-xs text-gray-500 font-medium">القرارات الإدارية المتاحة:</span>
                        
                        <div className="flex items-center gap-2">
                          <button 
                            onClick={() => handleAdminChangeStatus(selectedAppDetail.id, 'incomplete', selectedAppDetail.adminComments)}
                            className="bg-orange-100 text-orange-700 hover:bg-orange-200 px-4 py-2 rounded-xl text-xs font-bold transition flex items-center gap-1"
                          >
                            <AlertCircle className="w-4 h-4" /> طلب استكمال النواقص (تعديل)
                          </button>

                          <button 
                            onClick={() => handleAdminChangeStatus(selectedAppDetail.id, 'approved', selectedAppDetail.adminComments)}
                            className="bg-green-100 text-green-700 hover:bg-green-200 px-4 py-2 rounded-xl text-xs font-bold transition flex items-center gap-1"
                          >
                            <CheckCircle className="w-4 h-4" /> قبول نهائي مكتمل
                          </button>

                          <button 
                            onClick={() => handleAdminChangeStatus(selectedAppDetail.id, 'rejected', selectedAppDetail.adminComments)}
                            className="bg-red-100 text-red-700 hover:bg-red-200 px-4 py-2 rounded-xl text-xs font-bold transition flex items-center gap-1"
                          >
                            <XCircle className="w-4 h-4" /> رفض الطلب بالكامل
                          </button>
                        </div>
                      </div>

                    </div>

                  </div>

                  {/* Modal Footer */}
                  <div className="bg-gray-50 px-6 py-4 border-t flex justify-end">
                    <button 
                      onClick={() => setSelectedAppDetail(null)}
                      className="bg-[#f37021] hover:bg-[#d95f16] text-white px-5 py-2.5 rounded-xl text-xs font-bold transition"
                    >
                      إغلاق نافذة التدقيق الحالية
                    </button>
                  </div>

                </div>
              </div>
            )}

          </div>
        )}

      </main>

      {/* ================= CUSTOM MESSAGE BOX / DIALOG MODAL ================= */}
      {dialog && (
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[110] p-4">
          <div className="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl animate-in fade-in zoom-in-95 duration-150 text-right">
            <div className="flex items-center gap-3 border-b pb-3 mb-4">
              {dialog.type === 'success' ? (
                <CheckCircle className="w-6 h-6 text-green-600 shrink-0" />
              ) : dialog.type === 'error' ? (
                <XCircle className="w-6 h-6 text-red-600 shrink-0" />
              ) : (
                <Info className="w-6 h-6 text-blue-600 shrink-0" />
              )}
              <h4 className="font-bold text-gray-900 text-base">{dialog.title}</h4>
            </div>
            
            <p className="text-xs text-gray-600 leading-relaxed mb-6">{dialog.body}</p>
            
            <div className="flex justify-end">
              <button
                onClick={() => setDialog(null)}
                className="bg-[#f37021] hover:bg-[#d95f16] text-white px-5 py-2 rounded-xl text-xs font-bold transition shadow-sm"
              >
                حسناً، فهمت
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ================= LIGHTBOX FILE PREVIEW MODAL ================= */}
      {activePreviewFile && (
        <div className="fixed inset-0 bg-black/85 flex items-center justify-center z-[100] p-4">
          <div className="bg-white rounded-3xl max-w-3xl w-full max-h-[95vh] flex flex-col overflow-hidden shadow-2xl animate-in fade-in zoom-in-95 duration-200 text-right">
            
            {/* Header info for file preview */}
            <div className="p-5 border-b bg-gray-50 flex items-center justify-between">
              <div>
                <h4 className="font-black text-gray-900 text-base">{activePreviewFile.title}</h4>
                <p className="text-xs text-gray-500 font-mono">اسم الملف: {activePreviewFile.fileName}</p>
              </div>
              
              <div className="flex items-center gap-2">
                <a
                  href={activePreviewFile.dataUrl}
                  download={activePreviewFile.fileName}
                  className="bg-[#81bd41] hover:bg-[#6fa337] text-white px-4 py-2 rounded-xl text-xs font-bold transition flex items-center gap-1.5 shadow-sm"
                >
                  <Download className="w-4 h-4" /> حفظ وتحميل المستند
                </a>
                
                <button
                  onClick={() => setActivePreviewFile(null)}
                  className="bg-gray-200 hover:bg-gray-300 p-2 rounded-xl transition"
                  title="إغلاق المعاينة"
                >
                  <X className="w-5 h-5 text-gray-700" />
                </button>
              </div>
            </div>

            {/* Scrollable File Body Preview */}
            <div className="p-6 overflow-y-auto flex-1 bg-gray-100 flex items-center justify-center min-h-[400px]">
              {activePreviewFile.dataUrl && (activePreviewFile.dataUrl.startsWith('data:image/') || activePreviewFile.dataUrl.startsWith('data:image/svg+xml')) ? (
                <div className="w-full flex justify-center max-h-[70vh]">
                  <img 
                    src={activePreviewFile.dataUrl} 
                    alt={activePreviewFile.title}
                    className="max-w-full max-h-[70vh] object-contain rounded-lg border shadow-sm bg-white" 
                  />
                </div>
              ) : (
                <div className="text-center space-y-3 p-8 bg-white rounded-2xl border max-w-md shadow-sm">
                  <FileText className="w-16 h-16 text-gray-400 mx-auto" />
                  <h5 className="font-bold text-gray-800">مستند رقمي غير صوري</h5>
                  <p className="text-xs text-gray-500">تم رفع المستند بصيغة لا تدعم العرض المباشر بالمتصفح (مثل PDF أو DOCX).</p>
                  <a
                    href={activePreviewFile.dataUrl}
                    download={activePreviewFile.fileName}
                    className="inline-flex bg-[#f37021] text-white px-5 py-2.5 rounded-xl text-xs font-bold transition hover:bg-[#d95f16] items-center gap-2"
                  >
                    <Download className="w-4 h-4" /> تحميل وحفظ الملف لقراءته
                  </a>
                </div>
              )}
            </div>

            {/* Footer informational bar */}
            <div className="p-4 bg-gray-50 border-t text-center text-xs text-gray-500 font-medium">
              بوابة معاينة المستندات الرقمية لجمعية بناء وتنمية المساكن بجازان - 2026
            </div>

          </div>
        </div>
      )}

      {/* ================= GLOBAL FLOATING NOTIFICATION BANNER ================= */}
      {currentUser && currentUser.role === 'beneficiary' && applications.some(a => a.userId === currentUser.id && a.status === 'incomplete') && (
        <div className="fixed bottom-4 right-4 max-w-sm bg-orange-600 text-white rounded-2xl shadow-2xl p-4 border border-orange-500 z-50 animate-bounce flex items-start gap-3">
          <Bell className="w-5 h-5 shrink-0 mt-0.5 text-orange-100" />
          <div className="text-right">
            <h4 className="text-xs font-bold">تنبيه من لجنة تدقيق المستندات:</h4>
            <p className="text-[11px] text-orange-100 mt-1 leading-relaxed">
              أحد طلباتك يحتاج لتعديل لعدم اكتمال الشروط المعتمدة. اضغط على "طلباتي الحالية" لمراجعة توجيهات الجمعية وتعديل المرفق المعني.
            </p>
            <button 
              onClick={() => setActiveTab('my-applications')}
              className="mt-2 bg-white text-orange-600 px-2.5 py-1 rounded-md text-[10px] font-extrabold shadow-sm hover:bg-orange-50 transition"
            >
              عرض وتعديل الطلب الآن
            </button>
          </div>
        </div>
      )}

    </div>
  );
}

const root = createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
