<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة استبيان الأسر - جمعية بناء وتنمية مساكن بجازان</title>
    
    <!-- خط تجوال العربي الرسمي الأنيق للمواقع الحكومية والخيرية بالمملكة -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    
    <!-- مكتبة Tailwind CSS للتنسيق العصري والخلاب -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- مكتبة Alpine.js لإدارة تفاعل الاستبيان وحفظ البيانات برمجياً وبسلاسة فائقة -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Tajawal', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            orange: '#f27224',  // البرتقالي الأساسي بهوية بناء وتنمية
                            orangeHover: '#d95e16',
                            green: '#81c341',   // الأخضر الحيوي للتنمية المستدامة
                            greenHover: '#6ca830',
                            gray: '#949599',    // الرمادي الرسمي للأوراق الرسمية والحدود
                            light: '#f9fafb'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        /* إضافة النقاط المتدرجة المعتمدة بالهوية البصرية بصفحة 4 لمنع الفراغات الجمالية */
        .identity-pattern {
            background-image: radial-gradient(#949599 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            opacity: 0.04;
        }
        /* منع ظهور شريط التمرير الأفقي بالتصميم المتجاوب */
        body {
            overflow-x: hidden;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex flex-col relative" x-data="surveyPortal()">

    <!-- الخلفية الجرافيكية المعتمدة بنقاط الهوية البصرية للجمعية -->
    <div class="absolute inset-0 identity-pattern pointer-events-none z-0"></div>

    <header class="bg-white shadow-sm border-b-4 border-brand-green sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4 py-3 flex flex-col sm:flex-row items-center justify-between gap-4">
            
            <!-- لوجو الجمعية الرسمي المعاد رسمه برمجياً بالـ SVG لمظهر فائق الدقة والاحترافية -->
            <div class="flex items-center gap-3">
                <div class="w-14 h-14 bg-white rounded-2xl shadow-sm p-1 border border-gray-150 flex items-center justify-center flex-shrink-0">
                    <svg viewBox="0 0 100 100" class="w-full h-full">
                        <!-- الخلفية والأشكال الجانبية الرمادية المعبرة عن المباني والبيوت -->
                        <path d="M25,80 L35,25 L50,25 L45,80 Z" fill="#949599" opacity="0.8" />
                        <path d="M75,80 L65,30 L50,30 L55,80 Z" fill="#949599" opacity="0.6" />
                        <!-- الهيكل البرتقالي الرئيسي بالوسط (البناء والتطوير السكني) -->
                        <path d="M42,80 L42,40 L35,40 L45,15 L58,15 L58,35 L48,40 L48,80 Z" fill="#f27224" />
                        <!-- القوس السفلي الأخضر (شكل الأرض الخصبة والزراعة والنماء بجازان) -->
                        <path d="M10,45 C20,85 80,85 90,45 C80,65 20,65 10,45" fill="#81c341" />
                    </svg>
                </div>
                <div class="text-center sm:text-right">
                    <h1 class="text-lg md:text-xl font-black text-brand-orange leading-none">جمعية بناء وتنمية مساكن</h1>
                    <p class="text-[11px] md:text-xs font-bold text-brand-green mt-1">بمنطقة جازان | مسكن ملائم وتنمية مستدامة للأسر المستفيدة</p>
                </div>
            </div>

            <!-- معلومات الترخيص الرسمي تحت مظلة وزارة الشؤون البلدية والقروية والإسكان والمركز الوطني -->
            <div class="bg-gray-100 px-4 py-1.5 rounded-xl text-center sm:text-left border border-gray-200">
                <span class="text-[9px] text-gray-500 block font-bold">المركز الوطني لتنمية القطاع غير الربحي</span>
                <span class="text-xs text-brand-orange font-black">ترخيص رسمي رقم: 834</span>
            </div>
        </div>
    </header>

    <!-- نظام التنبيهات الذكي التفاعلي -->
    <div x-show="toast.show" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-[-10px]"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 translate-y-[-10px]"
         class="fixed top-5 left-5 right-5 md:left-auto md:w-96 z-50 p-4 rounded-2xl shadow-xl flex items-center gap-3 text-white border transition-all duration-300"
         :class="toast.type === 'success' ? 'bg-green-600 border-green-700' : 'bg-brand-orange border-brand-orange'"
         style="display: none;">
        <svg class="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span class="text-xs font-bold leading-relaxed" x-text="toast.message"></span>
    </div>

    <!-- الجسم الرئيسي للموقع -->
    <main class="flex-grow max-w-5xl w-full mx-auto p-4 md:p-6 z-10 relative">

        <!-- ==================== أولاً: واجهة الاستبيان الموجهة للمستفيدين ==================== -->
        <div x-show="view === 'survey'" class="space-y-8">
            
            <!-- بطاقة الترحيب والتعريف المباشر برؤية وأهداف الجمعية -->
            <div class="bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-gray-100 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-32 h-32 bg-brand-orange opacity-5 rounded-bl-full pointer-events-none"></div>
                <div class="flex flex-col md:flex-row items-center gap-4 text-center md:text-right">
                    <div class="bg-brand-orange/10 w-12 h-12 rounded-2xl flex items-center justify-center text-brand-orange flex-shrink-0">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H5a2 2 0 00-2 2v16m14
